<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Discovery presented by rockin'on — 音楽業界特化キャリアプラットフォーム</title>
  <meta name="viewport" content="width=1440" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>
  <script src="image-slot.js"></script>
<link id="gfont-Bebas-Neue" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@300;400;500;600;700&amp;display=swap">
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="public_screens.jsx"></script>
  <script type="text/babel" src="public_aux.jsx"></script>
  <script type="text/babel" src="company_admin.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function NavBar({ current, onNav, menuOpen, setMenuOpen }) {
      const screen = window.MW_DATA.screens.find(s => s.id === current);
      const group = screen?.group || 'public';
      return (
        <div className="topbar">
          <button className="screen-picker" onClick={() => setMenuOpen(!menuOpen)}>
            <span className="sig">■</span>
            <span className="code">{current}</span>
            <span className="name">{screen?.name}</span>
            <span className="caret">▾</span>
          </button>
          <div className="topbar-right">
            <span className="topbar-group">{group === 'public' ? 'PUBLIC SITE' : group === 'company' ? 'COMPANY CONSOLE' : 'ADMIN CONSOLE'}</span>
            <span className="topbar-sep">/</span>
            <span className="topbar-code">{current}</span>
          </div>
        </div>
      );
    }

    function ScreenMenu({ current, onNav, onClose }) {
      const groups = { public: [], company: [], admin: [] };
      window.MW_DATA.screens.forEach(s => groups[s.group].push(s));
      return (
        <div className="menu-overlay" onClick={onClose}>
          <div className="menu-panel" onClick={e => e.stopPropagation()}>
            <div className="menu-head">
              <div>
                <div className="eyebrow">Screen Registry</div>
                <h2>ALL SCREENS</h2>
                <div className="menu-sub">Discovery Prototype · {window.MW_DATA.screens.length} screens across 3 areas</div>
              </div>
              <button className="menu-close" onClick={onClose}>✕</button>
            </div>
            {Object.entries(groups).map(([g, list]) => (
              <div key={g} className="menu-group">
                <div className="menu-group-title">
                  <span className="g-tag">{g.toUpperCase()}</span>
                  <span className="g-count">{list.length} screens</span>
                </div>
                <div className="menu-grid">
                  {list.map(s => (
                    <div key={s.id} className={"menu-card" + (s.id === current ? " active" : "")}
                         onClick={() => { onNav(s.id); onClose(); }}>
                      <div className="code">{s.id}</div>
                      <div className="name">{s.name}</div>
                      <div className="purpose">{s.purpose}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MobileDrawer({ onNav, onClose }) {
      const go = (id) => { onClose(); onNav(id); };
      const Soc = ({ d }) => (<span className="dp-soc"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">{d}</svg></span>);
      return (
        <div className="dp-drawer">
          <div className="dp-drawer-top">
            <div className="dp-logo" onClick={() => go('SCR-001')}>
              <span className="mark">Discovery</span>
              <span className="by">presented by rockin'on</span>
            </div>
            <button className="dp-drawer-close" aria-label="閉じる" onClick={onClose}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="5" y1="5" x2="19" y2="19" /><line x1="19" y1="5" x2="5" y2="19" /></svg>
            </button>
          </div>
          <nav className="dp-drawer-nav">
            <a onClick={() => go('SCR-002')}>求人を探す</a>
            <a onClick={() => go('SCR-009')}>企業を探す</a>
            <a onClick={() => go('SCR-014')}>お知らせ</a>
            <a className="gap" onClick={() => go('SCR-002')}>検索する</a>
            <a onClick={() => go('SCR-008')}>お気に入り</a>
          </nav>
          <div className="dp-drawer-auth">
            <button className="dp-btn ghost" onClick={() => go('SCR-007')}>ログイン</button>
            <button className="dp-btn solid" onClick={() => go('SCR-006')}>新規登録</button>
          </div>
          <div className="dp-drawer-links">
            <a onClick={() => go('SCR-015')}>利用規約</a>
            <a onClick={() => go('SCR-015')}>プライバシーポリシー</a>
            <a onClick={() => go('SCR-015')}>運営会社</a>
            <a onClick={() => go('SCR-015')}>お問い合わせ</a>
          </div>
          <div className="dp-drawer-soc">
            <div className="label">FOLLOW US</div>
            <div className="icons">
              <Soc d={<path d="M18.9 2H22l-7 8 8.2 12h-6.5l-5-7.3L4.8 22H1.7l7.5-8.6L1 2h6.7l4.6 6.7L18.9 2zm-1.1 18h1.8L7.2 3.9H5.3L17.8 20z" />} />
              <Soc d={<path d="M12 2.2c3.2 0 3.6 0 4.9.07 3.3.15 4.8 1.7 5 5 .06 1.3.07 1.6.07 4.8s0 3.5-.07 4.8c-.15 3.3-1.7 4.8-5 5-1.3.06-1.6.07-4.9.07s-3.6 0-4.9-.07c-3.3-.15-4.8-1.7-5-5C2.05 15.5 2 15.2 2 12s0-3.5.07-4.8c.15-3.3 1.7-4.8 5-5C8.4 2.2 8.8 2.2 12 2.2zm0 3.2A6.6 6.6 0 1018.6 12 6.6 6.6 0 0012 5.4zm0 10.9A4.3 4.3 0 1116.3 12 4.3 4.3 0 0112 16.3zm6.8-11.2a1.55 1.55 0 11-1.55-1.55A1.55 1.55 0 0118.8 5.1z" />} />
              <Soc d={<path d="M23 7.5a3 3 0 00-2.1-2.1C19 4.8 12 4.8 12 4.8s-7 0-8.9.6A3 3 0 001 7.5 31 31 0 00.5 12 31 31 0 001 16.5a3 3 0 002.1 2.1c1.9.6 8.9.6 8.9.6s7 0 8.9-.6a3 3 0 002.1-2.1A31 31 0 0023.5 12 31 31 0 0023 7.5zM9.8 15.3V8.7l5.7 3.3z" />} />
            </div>
          </div>
        </div>
      );
    }

    function MobileTabBar({ onNav, current }) {
      const Item = ({ id, label, active, children }) => (
        <button className={"dp-tab" + (active ? ' active' : '')} onClick={() => onNav(id)}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">{children}</svg>
          <span>{label}</span>
        </button>
      );
      return (
        <nav className="dp-tabbar">
          <Item id="SCR-001" label="ホーム" active={current === 'SCR-001'}><path d="M3 11l9-7 9 7" /><path d="M5 10v10h14V10" /></Item>
          <Item id="SCR-002" label="求人を探す" active={current === 'SCR-002'}><circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.5" y2="16.5" /></Item>
          <Item id="SCR-008" label="お気に入り" active={false}><polygon points="12 2.5 15 9 22 9.5 16.5 14 18.3 21 12 17.2 5.7 21 7.5 14 2 9.5 9 9" /></Item>
          <Item id="SCR-008" label="マイページ" active={current === 'SCR-008'}><circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></Item>
        </nav>
      );
    }

    function SiteHeader({ onNav, current }) {
      const [drawer, setDrawer] = useState(false);
      const screen = window.MW_DATA.screens.find(s => s.id === current);
      if (!screen || screen.group !== 'public') return null;
      const Mag = () => (<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.5" y2="16.5" /></svg>);
      const Star = () => (<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polygon points="12 2.5 15 9 22 9.5 16.5 14 18.3 21 12 17.2 5.7 21 7.5 14 2 9.5 9 9" /></svg>);
      return (
        <React.Fragment>
        <header className="dp-header">
          <div className="dp-logo" onClick={() => onNav('SCR-001')}>
            <span className="mark">Discovery</span>
            <span className="by">presented by rockin'on</span>
          </div>
          <nav className="dp-nav">
            <a onClick={() => onNav('SCR-002')}>求人を探す</a>
            <a onClick={() => onNav('SCR-009')}>企業を探す</a>
            <a onClick={() => onNav('SCR-014')}>お知らせ</a>
          </nav>
          <div className="dp-actions">
            <button className="dp-iconlink" onClick={() => onNav('SCR-002')}><Mag /><span>検索する</span></button>
            <button className="dp-iconlink" onClick={() => onNav('SCR-008')}><Star /><span>お気に入り</span></button>
            <button className="dp-btn ghost" onClick={() => onNav('SCR-007')}>ログイン</button>
            <button className="dp-btn solid" onClick={() => onNav('SCR-006')}>新規登録</button>
          </div>
          <div className="dp-mobtoggle">
            <button className="dp-mobicon" aria-label="検索" onClick={() => onNav('SCR-002')}><Mag /></button>
            <button className="dp-mobicon" aria-label="メニュー" onClick={() => setDrawer(true)}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="3" y1="7" x2="21" y2="7" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="17" x2="21" y2="17" /></svg>
            </button>
          </div>
        </header>
        {drawer && <MobileDrawer onNav={onNav} onClose={() => setDrawer(false)} />}
        </React.Fragment>
      );
    }

    function CompanySidebar({ onNav, current }) {
      const items = [
        { id: 'SCR-017', label: 'ダッシュボード', icon: '◉' },
        { id: 'SCR-018', label: '求人管理', icon: '♪' },
        { id: 'SCR-020', label: '応募者管理', icon: '◈' },
        { id: 'SCR-022', label: 'アナリティクス', icon: '▲' },
      ];
      return (
        <aside className="console-sidebar">
          <div className="cs-logo">Discovery<span className="r">.</span> <span className="sub">COMPANY</span></div>
          <div className="cs-company">
            <div className="logo">R</div>
            <div>
              <div className="n">rockin'on inc.</div>
              <div className="s">ENTERPRISE PLAN</div>
            </div>
          </div>
          <nav>
            {items.map(i => (
              <a key={i.id} className={current === i.id || (i.id === 'SCR-018' && (current === 'SCR-019')) || (i.id === 'SCR-020' && current === 'SCR-021') ? 'active' : ''}
                 onClick={() => onNav(i.id)}>
                <span className="ico">{i.icon}</span>{i.label}
              </a>
            ))}
          </nav>
          <div className="cs-footer">
            <a onClick={() => onNav('SCR-001')}>← サイトへ戻る</a>
          </div>
        </aside>
      );
    }

    function AdminSidebar({ onNav, current }) {
      const items = [
        { id: 'SCR-028', label: 'オーバービュー', icon: '◉' },
        { id: 'SCR-029', label: '求人審査', icon: '⏺' },
        { id: 'SCR-030', label: '企業管理', icon: '◈' },
        { id: 'SCR-031', label: '会員管理', icon: '♛' },
      ];
      return (
        <aside className="console-sidebar admin">
          <div className="cs-logo">Discovery<span className="r">.</span> <span className="sub">ADMIN</span></div>
          <div className="cs-company">
            <div className="logo">A</div>
            <div>
              <div className="n">System Admin</div>
              <div className="s">SUPER ACCESS</div>
            </div>
          </div>
          <nav>
            {items.map(i => (
              <a key={i.id} className={current === i.id ? 'active' : ''} onClick={() => onNav(i.id)}>
                <span className="ico">{i.icon}</span>{i.label}
              </a>
            ))}
          </nav>
          <div className="cs-footer">
            <a onClick={() => onNav('SCR-001')}>← サイトへ戻る</a>
          </div>
        </aside>
      );
    }

    function renderScreen(id, ctx, nav) {
      const P = { nav, ...ctx };
      switch (id) {
        case 'SCR-001': return <TopPage {...P} />;
        case 'SCR-002': return <SearchPage {...P} />;
        case 'SCR-003': return <JobDetail {...P} />;
        case 'SCR-004': return <ApplyPage {...P} />;
        case 'SCR-005': return <ApplyDone {...P} />;
        case 'SCR-006': return <SignupPage {...P} />;
        case 'SCR-007': return <LoginPage {...P} />;
        case 'SCR-008': return <MyPage {...P} />;
        case 'SCR-009': return <CompanyPage {...P} />;
        case 'SCR-010': return <CompanyLP {...P} />;
        case 'SCR-012': return <PasswordResetPage {...P} />;
        case 'SCR-014': return <NewsPage {...P} />;
        case 'SCR-015': return <StaticPage {...P} />;
        case 'SCR-016': return <LoginPage {...P} forCompany />;
        case 'SCR-017': return <CompanyDashboard {...P} />;
        case 'SCR-018': return <JobMgmtList {...P} />;
        case 'SCR-019': return <JobEditor {...P} />;
        case 'SCR-020': return <ApplicantList {...P} />;
        case 'SCR-021': return <ApplicantDetail {...P} />;
        case 'SCR-022': case 'SCR-023': return <AnalyticsPage {...P} />;
        case 'SCR-024': case 'SCR-025': case 'SCR-026': return <CompanyDashboard {...P} />;
        case 'SCR-027': return <LoginPage {...P} forAdmin />;
        case 'SCR-028': return <AdminOverview {...P} />;
        case 'SCR-029': return <AdminReview {...P} />;
        case 'SCR-030': case 'SCR-031': return <AdminCompanies {...P} />;
        case 'SCR-032': return <AdminMembers {...P} />;
        case 'SCR-033': return <AnalyticsPage {...P} />;
        case 'SCR-034': return <AdminOverview {...P} />;
        default: return <div style={{ padding: 40 }}>Not found: {id}</div>;
      }
    }

    function App() {
      const [current, setCurrent] = useState(() => localStorage.getItem('mw_current') || 'SCR-001');
      const [ctx, setCtx] = useState({});
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => { localStorage.setItem('mw_current', current); window.scrollTo({ top: 0 }); }, [current]);

      const nav = (id, c = {}) => { setCtx(c); setCurrent(id); };
      const screen = window.MW_DATA.screens.find(s => s.id === current);
      const group = screen?.group || 'public';

      let content;
      if (group === 'company' && !['SCR-016'].includes(current)) {
        content = (
          <div className="console-layout" data-screen-label={current}>
            <CompanySidebar onNav={nav} current={current} />
            <div className="console-main">{renderScreen(current, ctx, nav)}<SiteFooter nav={nav} /></div>
          </div>
        );
      } else if (group === 'admin' && !['SCR-027'].includes(current)) {
        content = (
          <div className="console-layout" data-screen-label={current}>
            <AdminSidebar onNav={nav} current={current} />
            <div className="console-main">{renderScreen(current, ctx, nav)}<SiteFooter nav={nav} /></div>
          </div>
        );
      } else {
        content = (
          <div data-screen-label={current}>
            <SiteHeader onNav={nav} current={current} />
            {renderScreen(current, ctx, nav)}
            <SiteFooter nav={nav} />
            <MobileTabBar onNav={nav} current={current} />
          </div>
        );
      }

      return (
        <>
          <NavBar current={current} onNav={nav} menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
          <div className="viewport">{content}</div>
          {menuOpen && <ScreenMenu current={current} onNav={nav} onClose={() => setMenuOpen(false)} />}
        </>
      );
    }

    // Wait for all babel scripts to finish
    setTimeout(() => {
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    }, 300);
  </script>
</body>
</html>
